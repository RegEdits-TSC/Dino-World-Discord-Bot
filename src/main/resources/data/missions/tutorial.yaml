# Dino-World: tutorial mission set.
#
# Loaded by MissionCatalog at module startup. Each mission auto-awards
# its coin/XP reward the first time MissionAwarder sees the trigger
# condition satisfied for a player; the player gets a follow-up
# ephemeral with the milestone right after the triggering action.
#
# Total tutorial reward: 1400 coins, 415 XP.
# Sized for the live shop where the cheapest Common egg is 500c:
#   - After /profile + check_profile (+250c)                    = 250c
#   - After /daily (100c) + claim mission (+250c)               = 600c  ← 500c egg + 100c buffer at shop time
#   - After /shop + browse mission (+250c)                      = 850c
#   - After buying egg (-500c) + buy_first_egg mission (+200c)  = 550c
#   - After hatch + hatch mission (+200c)                       = 750c
#   - Plus +100/+50/+100 from feed / dashboard / inspect        = 1000c at end of tutorial
# The /profile step is intentional: it puts the player at ≥500c by the
# time /shop renders, so the "Your balance" line and the per-egg Buy
# button are correct on first view even if the visit_shop mission
# reward is still in flight on another worker thread.
# Enough for a second Common, a Zookeeper hire, or saving up for an Uncommon at level 5.
#
# Trigger format:
#   state:claimed_daily   — player.last_daily IS NOT NULL
#   state:owns_egg        — egg_instance count > 0 for the player
#   state:owns_dino       — dino_instance count > 0 for the player
#   state:fed_dino        — any dino has last_fed_at set
#   command:<name>        — the player ran /<name> (any subcommand)
#   command:<name>:<sub>  — the player ran /<name> <sub> specifically

set_id: tutorial
display_name: New Park Keeper
description: Get rolling with these onboarding missions. Each one auto-awards coins and XP the first time you complete the action.

missions:
  - id: check_profile
    display_name: Check your profile
    description: Run `/profile` to see your park-keeper stats.
    trigger: command:profile
    reward_coins: 250
    reward_xp: 50

  - id: claim_first_daily
    display_name: Claim your first daily
    description: Run `/daily` for your first 100 coins.
    trigger: state:claimed_daily
    reward_coins: 250
    reward_xp: 75

  - id: visit_shop
    display_name: Browse the shop
    description: Run `/shop` to see what Common eggs are for sale (cheapest is 500c).
    trigger: command:shop
    reward_coins: 250
    reward_xp: 50

  - id: buy_first_egg
    display_name: Buy your first egg
    description: Spend coins on a Common egg from `/shop`.
    trigger: state:owns_egg
    reward_coins: 200
    reward_xp: 50

  - id: hatch_first_dino
    display_name: Hatch your first dinosaur
    description: Wait for the egg to be ready and run `/eggs` to hatch it.
    trigger: state:owns_dino
    reward_coins: 200
    reward_xp: 75

  - id: feed_first_dino
    display_name: Feed your dinosaur
    description: Use `/feed` to keep your dino happy and earning coins.
    trigger: state:fed_dino
    reward_coins: 100
    reward_xp: 30

  - id: check_park_dashboard
    display_name: Check your park dashboard
    description: Run `/zoo dashboard` to see your park summary.
    trigger: command:zoo:dashboard
    reward_coins: 50
    reward_xp: 25

  - id: inspect_a_dino
    display_name: Inspect one of your dinos
    description: Use `/dino inspect` to see why a dino isn't 100% happy.
    trigger: command:dino:inspect
    reward_coins: 100
    reward_xp: 60
