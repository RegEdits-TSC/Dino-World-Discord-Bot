# Per-rarity defaults consumed by RarityCatalog and overridable per-species.
#
# fields:
#   display_name              user-visible label
#   color                     RGB int for embed accents (hex literal works)
#   mystery_egg_cost          coins per mystery egg of this rarity
#   determined_egg_multiplier mystery_cost × multiplier = default determined cost
#   incubation_minutes        default duration; species YAML may override
#   hatch_xp                  player XP awarded when an egg of this rarity hatches
#
# Pricing curve roughly 3× per tier so each rarity feels meaningfully more
# valuable than the one below. Incubation doubles each step from common (30m)
# up to mythic (24h). The min_level curve is gentle early then sharp — keeps
# the game open at the start, mythic is the long-term goal at level 100.
# All values are tunable as a balance pass without code.
common:
  display_name: Common
  color: 0x9D9D9D
  mystery_egg_cost: 200
  determined_egg_multiplier: 2.5
  incubation_minutes: 30
  hatch_xp: 10
  min_level: 1

uncommon:
