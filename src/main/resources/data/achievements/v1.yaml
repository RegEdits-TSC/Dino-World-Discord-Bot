# Dino-World: v1 achievements catalog.
#
# Loaded by AchievementCatalog at module startup. Each entry's id is
# scoped under the catalog id (e.g. v1.first_hatch). The awarder
# auto-unlocks an achievement the first time its trigger predicate is
# satisfied, grants the coin/XP reward, auto-equips the title if the
# player has no title yet, and DMs the player via NotificationService.
#
# Trigger formats (see AchievementTrigger.parse):
#   event:first_hatch                — fires once on the first hatch ever
#   event:first_shiny                — first shiny hatched
#   event:first_feed                 — first /feed action taken
#   event:first_staff_hire           — first staff hired
#   event:first_enclosure            — first non-starter enclosure built
#   level:5                          — player level reaches N
#   dino_level:50                    — at least one owned dino at level N
#   feeds_total:100                  — feeds-this-player counted via coin_ledger reasons / mission triggers
#   hatches_total:25                 — total dinos hatched (count of dino_instance)
#   keep_dinos:10                    — currently owns >= N dinos
#   own_enclosures:3                 — currently owns >= N enclosures
#   coins_earned:100000              — lifetime positive coin_ledger sum
#   coins_held:500000                — current player.coins >= N
#   wages_paid:10                    — staff wage payouts >= N (counted via coin_ledger reason 'wages.tick')
#   hatched_rarity:uncommon          — has ever hatched a dino of this rarity (one per tier)
#   trait_diversity:7                — owns at least one dino of each trait (excluding plain)
#   tutorial_complete                — all tutorial.* mission rows present

catalog_id: v1
display_name: Park Keeper Achievements
description: One-shot milestones that reward titles and small coin/XP bonuses.

achievements:

