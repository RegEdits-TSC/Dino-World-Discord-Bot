name: release

# Builds a shadow jar and publishes it as a GitHub Release whenever a
# tag matching v* is pushed. The release body is auto-generated from
# squash-merged PRs since the previous release, categorised by label
# (.github/release.yml controls the grouping).
#
# Tags containing "-alpha", "-beta", or "-rc" are marked as prereleases
# so the "Latest release" badge on the repo home only points at stable
# tags once a 1.0.0 ships.

on:
  push:
    tags:
      - 'v*'

# The default GITHUB_TOKEN starts read-only; releases need contents:write
# to create the release and upload assets. Nothing else is touched, so
# stay narrow.
permissions:
  contents: write

jobs:
  build-and-release:
    name: build & publish release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full tag history for any future changelog tooling that
          # diffs against the previous tag.
          fetch-depth: 0

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (with build cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Build shadow jar
        run: ./gradlew --no-daemon shadowJar

      - name: Locate built jar
        id: jar
        run: |
          jar=$(ls build/libs/Dino-World-*-all.jar | head -n1)
          if [ -z "$jar" ]; then
            echo "::error::No shadow jar found under build/libs/"
            exit 1
          fi
          echo "path=$jar" >> "$GITHUB_OUTPUT"
          echo "Found $jar"

      - name: Detect prerelease
        id: prerelease
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" == *-alpha* || "$tag" == *-beta* || "$tag" == *-rc* ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.jar.outputs.path }}
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.value }}
          fail_on_unmatched_files: true
